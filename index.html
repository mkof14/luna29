    <script>
        (function() {
            const savedTheme = localStorage.getItem('luna_theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>
    <style>
        * { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease; }
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; font-display: swap; }
        @font-face { font-family: 'Inter'; font-display: swap; src: local('Inter'); }
        
        /* Светлая тема: пудровые, лилово-дымчатые и кремовые тона */
        .dynamic-bg-light { 
            background:
              radial-gradient(1100px 760px at 6% 18%, rgba(252, 239, 225, 0.92) 0%, rgba(252, 239, 225, 0) 62%),
              radial-gradient(860px 640px at 86% 18%, rgba(134, 124, 153, 0.34) 0%, rgba(134, 124, 153, 0) 64%),
              radial-gradient(940px 640px at 72% 82%, rgba(208, 170, 152, 0.34) 0%, rgba(208, 170, 152, 0) 66%),
              linear-gradient(-28deg, #fdf8f2, #f2e8e2, #e9dee6, #f5ebe4);
            animation: bg-flow 40s ease infinite; 
            background-size: 400% 400%;
        }
        
        .dynamic-bg-dark { 
            background: linear-gradient(-45deg, #020617, #0f172a, #1e1b4b, #2d1b4b); 
            animation: bg-flow 30s ease infinite; 
            background-size: 400% 400%;
        }
        
        .glass { 
            background: rgba(252, 246, 243, 0.9); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(193, 176, 188, 0.42); 
        }
        
        .dark .glass { 
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(24px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        
        .shadow-luna { 
            box-shadow: 0 18px 44px -22px rgba(109, 92, 121, 0.34), 0 10px 24px -18px rgba(174, 136, 116, 0.24); 
        }

        /* Глобальное смягчение светлой темы */
        html:not(.dark) body {
            color: #5d5562;
        }

        html:not(.dark) body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
              radial-gradient(860px 620px at 22% 26%, rgba(255, 248, 241, 0.5) 0%, rgba(255, 248, 241, 0) 64%),
              radial-gradient(1040px 760px at 78% 36%, rgba(166, 151, 176, 0.3) 0%, rgba(166, 151, 176, 0) 70%),
              linear-gradient(120deg, rgba(255, 247, 238, 0.3), rgba(246, 236, 241, 0.24) 42%, rgba(235, 225, 236, 0.2));
            mix-blend-mode: screen;
            opacity: 0.98;
        }

        #root {
            position: relative;
            z-index: 1;
        }

        html:not(.dark) .bg-white {
            background-color: rgba(252, 247, 243, 0.88) !important;
        }

        html:not(.dark) .border-slate-200,
        html:not(.dark) .border-slate-300,
        html:not(.dark) .border-slate-100 {
            border-color: rgba(185, 168, 182, 0.36) !important;
        }

        html:not(.dark) .text-slate-900,
        html:not(.dark) .text-slate-800 {
            color: #5f5764 !important;
        }

        html:not(.dark) .text-slate-600,
        html:not(.dark) .text-slate-500 {
            color: #817582 !important;
        }

        html:not(.dark) .bg-luna-purple {
            background-color: rgba(134, 120, 151, 0.8) !important;
        }

        html:not(.dark) .text-luna-purple {
            color: #7f728a !important;
        }

        html:not(.dark) .bg-slate-950 {
            background-color: rgba(112, 98, 128, 0.82) !important;
        }

        html:not(.dark) button[class*="bg-luna-purple"],
        html:not(.dark) a[class*="bg-luna-purple"] {
            box-shadow: 0 12px 24px -16px rgba(126, 105, 147, 0.44) !important;
        }

        html:not(.dark) button[class*="bg-slate-950"],
        html:not(.dark) a[class*="bg-slate-950"] {
            box-shadow: 0 12px 24px -16px rgba(104, 88, 120, 0.42) !important;
        }

        html:not(.dark) button[class*="border-slate"],
        html:not(.dark) a[class*="border-slate"] {
            background-color: rgba(252, 246, 241, 0.58) !important;
        }

        html:not(.dark) .shadow-luna-rich,
        html:not(.dark) .shadow-luna-deep {
            box-shadow: 0 20px 48px -24px rgba(113, 95, 128, 0.38), 0 12px 24px -16px rgba(177, 138, 120, 0.25) !important;
        }
        
        .dark .shadow-luna { 
            box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.8), 0 0 20px rgba(109, 40, 217, 0.1); 
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        input[type="range"] {
            -webkit-appearance: none;
            background: transparent;
        }
    </style>
